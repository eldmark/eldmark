name: Update README (latest commit)

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    # Skip when the commit was made by the bot itself to avoid infinite loops.
    if: >
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.event.head_commit.message, 'chore: update README')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute latest commit info
        id: commit
        run: |
          SHA=$(git rev-parse --short HEAD)
          SUBJECT=$(git log -1 --format="%s")
          DATE=$(git log -1 --format="%ci" | cut -d' ' -f1)
          echo "sha=$SHA"         >> "$GITHUB_OUTPUT"
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"

      - name: Update CURRENTLY_WORKING block
        run: |
          CONTENT="- Working on **eldmark/eldmark** (main) — \`${{ steps.commit.outputs.sha }}\` ${{ steps.commit.outputs.subject }}"
          bash scripts/update-readme-blocks.sh README.md CURRENTLY_WORKING "$CONTENT"

      - name: Update LATEST_COMMIT block
        run: |
          CONTENT="- 🔖 \`${{ steps.commit.outputs.sha }}\` · ${{ steps.commit.outputs.subject }} _(${{ steps.commit.outputs.date }})_"
          bash scripts/update-readme-blocks.sh README.md LATEST_COMMIT "$CONTENT"

      - name: Commit changes if any
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update README (latest commit)"
            git push
          fi
